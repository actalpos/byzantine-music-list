<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Byzantine Music</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #fff;
}

.header {
  padding: 10px;
  border-bottom: 1px solid #ddd;
  position: sticky;
  top: 0;
  background: white;
  z-index: 10;
}

.breadcrumbs {
  font-size: 14px;
  color: #555;
}

.back {
  cursor: pointer;
  margin-bottom: 5px;
  display: inline-block;
}

/* 📱 MOBILE */
@media (max-width: 600px) {
  .grid {
    grid-template-columns: 1fr;
  }

  .icon {
    font-size: 28px;
  }
}

/* 📲 TABLET */
@media (min-width: 601px) and (max-width: 1024px) {
  .grid {
    grid-template-columns: repeat(2, 1fr);
  }

  .icon {
    font-size: 30px;
  }
}

/* 💻 DESKTOP */
@media (min-width: 1025px) {
  .grid {
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  }

  .icon {
    font-size: 24px;
  }
}

.tile {
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  padding: 24px;
  border-bottom: 1px solid grey;
}
  
.tile:hover .folder-icon {
  transform: translateY(-1px);
  box-shadow: 0 6px 10px rgba(0,0,0,0.25);
  transition: 0.2s;
}
  
.icon {
  font-size: 24px;
}

.folder-icon {
  width: 34px;
  height: 24px;
  background: linear-gradient(180deg, #fdd663, #fbbc04);
  border-radius: 4px;
  position: relative;
  box-shadow: 0 3px 6px rgba(0,0,0,0.2);
}

/* tab-ul de sus (binder flap) */
.folder-icon::before {
  content: "";
  position: absolute;
  top: -6px;
  left: 4px;
  width: 16px;
  height: 8px;
  background: linear-gradient(180deg, #fdd663, #fbbc04);
  border-radius: 3px 3px 0 0;
}

/* highlight subtil */
.folder-icon::after {
  content: "";
  position: absolute;
  top: 2px;
  left: 2px;
  right: 2px;
  height: 6px;
  background: rgba(255,255,255,0.25);
  border-radius: 2px;
}
  
.pdf-icon {
  background: #d93025;
  color: white;
  font-weight: bold;
  font-size: 12px;
  padding: 6px 8px;
  border-radius: 4px;
  display: inline-block;
}

.name {
  flex: 1;
  text-align: left;
  font-size: 18px;
}
</style>
</head>

<body>

<div class="header">
  <div class="back" onclick="goBack()">⬅ Back</div>
  <div class="breadcrumbs" id="breadcrumbs"></div>
</div>

<div id="app" class="grid"></div>

<script>
const API_KEY = "AIzaSyBqvqR37LmLLMJVk6e5OlNgGPN3x20xrK8";
const ROOT = "1TfBVD9ixWOJ7asLIO6bQdCYj17inMc1G";

let pathStack = [{ id: ROOT, name: "Home" }];
const cache = {};

async function loadFolder(folderId) {
  if (cache[folderId]) return cache[folderId];

  const url = `https://www.googleapis.com/drive/v3/files?q='${folderId}'+in+parents+and+trashed=false&fields=files(id,name,mimeType)&key=${API_KEY}`;
  
  const res = await fetch(url);
  const data = await res.json();

  cache[folderId] = data.files;
  return data.files;
}

function renderBreadcrumbs() {
  const el = document.getElementById("breadcrumbs");
  el.textContent = pathStack.map(p => p.name).join(" / ");
}

function goBack() {
  if (pathStack.length > 1) {
    pathStack.pop();
    openFolder(pathStack[pathStack.length - 1].id, false);
  }
}

async function openFolder(folderId, push = true, name = "") {
  if (push) pathStack.push({ id: folderId, name });

  renderBreadcrumbs();

  const app = document.getElementById("app");
  app.innerHTML = "Loading...";

  const items = await loadFolder(folderId);
  
  items.sort((a, b) => {
    if (a.mimeType === "application/vnd.google-apps.folder" && b.mimeType !== "application/vnd.google-apps.folder") return -1;
    if (a.mimeType !== "application/vnd.google-apps.folder" && b.mimeType === "application/vnd.google-apps.folder") return 1;
    return a.name.localeCompare(b.name);
  });

  app.innerHTML = "";

  items.forEach(item => {
    const tile = document.createElement("div");
    tile.className = "tile";

    if (item.mimeType === "application/vnd.google-apps.folder") {
      tile.innerHTML = `
        <div class="icon folder-icon"></div>
        <div class="name">${item.name}</div>
      `;
      tile.onclick = () => openFolder(item.id, true, item.name);
    } else if (item.mimeType === "application/pdf") {
      tile.innerHTML = `
        <div class="icon pdf-icon">PDF</div>
        <div class="name">${item.name}</div>
      `;
      tile.onclick = () => {
        window.open(`https://drive.google.com/file/d/${item.id}/preview`, "_blank");
      };
    }

    app.appendChild(tile);
  });
}

openFolder(ROOT, false, "Home");
</script>

</body>
</html>
