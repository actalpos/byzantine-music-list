<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Byzantine Music</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #fff;
}

.header {
  padding: 10px;
  border-bottom: 1px solid #ddd;
  position: sticky;
  top: 0;
  background: white;
  z-index: 10;
}

.breadcrumbs {
  font-size: 14px;
  color: #555;
}

.back {
  cursor: pointer;
  margin-bottom: 5px;
  display: inline-block;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
  gap: 12px;
  padding: 12px;
}

.tile {
  background: #f1f3f4;
  border-radius: 12px;
  padding: 12px;
  text-align: center;
  cursor: pointer;
  font-size: 14px;
}

.tile:hover {
  background: #e0e0e0;
}

.icon {
  font-size: 32px;
  display: block;
  margin-bottom: 5px;
}

.name {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
</style>
</head>

<body>

<div class="header">
  <div class="back" onclick="goBack()">⬅ Back</div>
  <div class="breadcrumbs" id="breadcrumbs"></div>
</div>

<div id="app" class="grid"></div>

<script>
const API_KEY = "PASTE_YOUR_API_KEY";
const ROOT = "1TfBVD9ixWOJ7asLIO6bQdCYj17inMc1G";

let pathStack = [{ id: ROOT, name: "Home" }];
const cache = {};

async function loadFolder(folderId) {
  if (cache[folderId]) return cache[folderId];

  const url = `https://www.googleapis.com/drive/v3/files?q='${folderId}'+in+parents+and+trashed=false&fields=files(id,name,mimeType)&key=${API_KEY}`;
  
  const res = await fetch(url);
  const data = await res.json();

  cache[folderId] = data.files;
  return data.files;
}

function renderBreadcrumbs() {
  const el = document.getElementById("breadcrumbs");
  el.textContent = pathStack.map(p => p.name).join(" / ");
}

function goBack() {
  if (pathStack.length > 1) {
    pathStack.pop();
    openFolder(pathStack[pathStack.length - 1].id, false);
  }
}

async function openFolder(folderId, push = true, name = "") {
  if (push) pathStack.push({ id: folderId, name });

  renderBreadcrumbs();

  const app = document.getElementById("app");
  app.innerHTML = "Loading...";

  const items = await loadFolder(folderId);

  app.innerHTML = "";

  items.forEach(item => {
    const tile = document.createElement("div");
    tile.className = "tile";

    if (item.mimeType === "application/vnd.google-apps.folder") {
      tile.innerHTML = `
        <div class="icon">📁</div>
        <div class="name">${item.name}</div>
      `;
      tile.onclick = () => openFolder(item.id, true, item.name);
    } else if (item.mimeType === "application/pdf") {
      tile.innerHTML = `
        <div class="icon">📄</div>
        <div class="name">${item.name}</div>
      `;
      tile.onclick = () => {
        window.open(`https://drive.google.com/file/d/${item.id}/preview`, "_blank");
      };
    }

    app.appendChild(tile);
  });
}

openFolder(ROOT, false, "Home");
</script>

</body>
</html>
